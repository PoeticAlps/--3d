<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#0a0a1a;overflow:hidden;color:#fff}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100}

.header{position:absolute;top:0;left:0;right:0;padding:16px 24px;background:linear-gradient(180deg,rgba(0,0,0,.9),transparent);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:22px;font-weight:600}.header h1 em{color:#ffd700;font-style:normal}
.header .info{font-size:12px;color:#888}
.sidebar{position:absolute;top:70px;right:16px;width:230px;background:rgba(10,10,26,.92);border-radius:14px;border:1px solid rgba(255,215,0,.2);padding:16px}
.sidebar h3{font-size:13px;color:#ffd700;margin-bottom:12px;font-weight:500}
.scene-btn{width:100%;padding:11px 14px;margin-bottom:8px;background:rgba(255,255,255,.04);border:1px solid transparent;border-radius:10px;cursor:pointer;text-align:left;transition:all .2s;color:#fff}
.scene-btn:hover{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3)}
.scene-btn.active{background:rgba(255,215,0,.15);border-color:#ffd700}
.scene-btn h4{font-size:14px;font-weight:500;margin-bottom:2px}.scene-btn p{font-size:11px;color:#888}
.detail{position:absolute;bottom:20px;left:20px;width:340px;background:rgba(10,10,26,.95);border-radius:14px;border:1px solid rgba(255,215,0,.2);padding:20px;display:none}
.detail.show{display:block}
.detail .close{position:absolute;top:14px;right:14px;width:28px;height:28px;background:rgba(255,255,255,.1);border:none;border-radius:50%;color:#888;cursor:pointer;font-size:16px}
.detail .close:hover{background:rgba(255,255,255,.2);color:#fff}
.detail h2{font-size:20px;color:#ffd700;margin-bottom:6px}.detail .year{font-size:12px;color:#666;margin-bottom:12px}
.detail .desc{font-size:13px;color:#bbb;line-height:1.7}.detail .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.detail .tag{padding:4px 10px;background:rgba(255,215,0,.12);color:#ffd700;border-radius:12px;font-size:11px}
.footer{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);padding:8px 20px;background:rgba(10,10,26,.8);border-radius:20px;font-size:11px;color:#666}
.footer em{color:#ffd700;font-style:normal}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .5s}
.loading.hide{opacity:0;pointer-events:none}
.loading h1{font-size:32px;margin-bottom:10px}.loading h1 em{color:#ffd700;font-style:normal}
.loading p{color:#666;font-size:14px}
</style>
</head>
<body>
<div class="loading" id="loading"><h1>🏛️ <em>重生·圆明园</em></h1><p>AI数字文化遗产 3D重建...</p></div>
<div id="ui">
<div class="header"><h1>🏛️ <em>重生·圆明园</em></h1><div class="info">2026 第19届全国3D大赛</div></div>
<div class="sidebar">
<h3>📍 重点景区</h3>
<button class="scene-btn active" data-scene="overview"><h4>🏞️ 全景漫游</h4><p>圆明园全景俯瞰</p></button>
<button class="scene-btn" data-scene="jiuzhou"><h4>🏝️ 九州清晏</h4><p>后湖核心·九岛仙山</p></button>
<button class="scene-btn" data-scene="dashuifa"><h4>🏛️ 大水法</h4><p>西洋楼·猎狗逐鹿</p></button>
<button class="scene-btn" data-scene="fangpu"><h4>🏯 方壶胜境</h4><p>人间仙境·水上楼阁</p></button>
<button class="scene-btn" data-scene="zhengda"><h4>👑 正大光明</h4><p>圆明园正殿</p></button>
</div>

</div>

<script src="three.min.js"></script>
<script>
var scene,camera,renderer,camTarget=new THREE.Vector3(0,0,0);
var camSph=new THREE.Spherical(100,Math.PI/3,Math.PI/4);
var isDrag=false,isPan=false,prevM={x:0,y:0};
var tgtPos=null,tgtLook=null,animT=0;

var SCENES={
overview:{pos:[0,0,0],cam:[90,65,90],title:'圆明园全景',year:'1707-1860',desc:'圆明园由圆明园、长春园、绮春园三园组成，占地5200余亩，是清代大型皇家园林，被誉为"万园之园"。',tags:['皇家园林','万园之园','文化遗产']},
jiuzhou:{pos:[0,0,0],cam:[35,25,35],title:'九州清晏',year:'1723·雍正元年',desc:'后湖中心九座岛屿象征华夏九州，主殿为皇帝寝宫，黄琉璃瓦歇山顶。',tags:['核心景区','九岛','皇帝寝宫']},
dashuifa:{pos:[0,0,70],cam:[25,18,95],title:'大水法',year:'1747·乾隆十二年',desc:'巴洛克风格喷泉，铜鹿鹿角喷水八道，十只铜犬直射鹿身，"猎狗逐鹿"奇景。',tags:['西洋楼','巴洛克','喷泉']},
fangpu:{pos:[70,0,0],cam:[95,25,25],title:'方壶胜境',year:'1750·乾隆十五年',desc:'仿神仙仙境，建筑矗立水面，九座仙桥相连，宛如蓬莱。',tags:['仙境','楼阁','九桥']},
zhengda:{pos:[-70,0,0],cam:[-45,25,25],title:'正大光明',year:'1723·雍正元年',desc:'圆明园正殿，雍正御笔匾额，重檐歇山顶，华表石狮。',tags:['正殿','雍正御笔','华表']}
};

// 简化材质
var M={
marble:new THREE.MeshPhongMaterial({color:0xf5f0e8,shininess:50}),
marbleD:new THREE.MeshPhongMaterial({color:0xe0d8c8,shininess:30}),
pillar:new THREE.MeshPhongMaterial({color:0x8b2020,shininess:30}),
gold:new THREE.MeshPhongMaterial({color:0xd4a84b,shininess:100,specular:0xffffff}),
roof:new THREE.MeshPhongMaterial({color:0xc9a227,shininess:60}),
wood:new THREE.MeshPhongMaterial({color:0x4a3020,shininess:10}),
water:new THREE.MeshPhongMaterial({color:0x1a7a8a,shininess:100,transparent:true,opacity:0.85}),
grass:new THREE.MeshPhongMaterial({color:0x3a6a3a,shininess:5}),
bronze:new THREE.MeshPhongMaterial({color:0x8b7355,shininess:60,specular:0x444444}),
rock:new THREE.MeshPhongMaterial({color:0x6a6a6a,shininess:5}),
hexi:new THREE.MeshPhongMaterial({color:0x1a5a8a,shininess:30})
};

function init(){
try{
scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a2a3a);
scene.fog=new THREE.Fog(0x1a2a3a,80,300);

camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,500);
camera.position.set(90,65,90);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

// 灯光
scene.add(new THREE.AmbientLight(0x8899bb,0.5));
var sun=new THREE.DirectionalLight(0xffeedd,1.0);
sun.position.set(60,100,40);sun.castShadow=true;
scene.add(sun);
scene.add(new THREE.DirectionalLight(0xaaccff,0.3).translateX(-40).translateY(50));
scene.add(new THREE.DirectionalLight(0xffd700,0.2).translateY(30).translateZ(-60));

buildWorld();
setupControls();
setupUI();

document.getElementById('loading').classList.add('hide');
animate();
}catch(e){
console.error('Init error:',e);
document.querySelector('.loading p').textContent='加载出错: '+e.message;
}
}

function buildWorld(){
// 水面
var water=new THREE.Mesh(new THREE.PlaneGeometry(400,400),M.water);
water.rotation.x=-Math.PI/2;water.position.y=-0.1;scene.add(water);
// 草地
var gnd=new THREE.Mesh(new THREE.PlaneGeometry(500,500),M.grass);
gnd.rotation.x=-Math.PI/2;gnd.position.y=-0.25;scene.add(gnd);
// 假山
for(var i=0;i<10;i++){
var r=new THREE.Mesh(new THREE.DodecahedronGeometry(3+Math.random()*4,1),M.rock);
r.position.set((Math.random()-0.5)*200,2,(Math.random()-0.5)*200);
r.scale.y=0.5;scene.add(r);
}
// 树木
for(var i=0;i<50;i++){
var x=(Math.random()-0.5)*240,z=(Math.random()-0.5)*240;
if(Math.abs(x)<20&&Math.abs(z)<20)continue;
var trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.25,2.5,8),M.wood);
trunk.position.set(x,1.25,z);scene.add(trunk);
var leaves=new THREE.Mesh(new THREE.SphereGeometry(1.5,8,8),M.grass);
leaves.position.set(x,3,z);scene.add(leaves);
}

buildJiuzhou();
buildDashuifa();
buildFangpu();
buildZhengda();
}

function buildHall(x,z,w,d,h){
var g=new THREE.Group();g.position.set(x,0,z);
// 三层基座
for(var i=0;i<3;i++){
var b=new THREE.Mesh(new THREE.BoxGeometry(w+6-i*2,0.45,d+6-i*2),M.marble);
b.position.y=0.22+i*0.45;b.castShadow=true;g.add(b);
}
// 望柱
for(var s=0;s<4;s++){
var len=s%2===0?w+2:d+2;var n=Math.floor(len/1.5);
for(var i=0;i<n;i++){
var p=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,0.65,6),M.marble);
var o=-len/2+i*(len/n)+len/(n*2);
if(s===0)p.position.set(o,1.55,-d/2-2);
else if(s===1)p.position.set(o,1.55,d/2+2);
else if(s===2)p.position.set(-w/2-2,1.55,o);
else p.position.set(w/2+2,1.55,o);
g.add(p);
}
}
// 台阶
for(var i=0;i<6;i++){
var st=new THREE.Mesh(new THREE.BoxGeometry(4,0.1,0.4),M.marble);
st.position.set(0,1.35+i*0.05,-d/2-2.5-i*0.35);g.add(st);
}
// 柱子
for(var i=0;i<6;i++){
[-d/3,d/3].forEach(function(pz){
var p=new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.3,h,12),M.pillar);
p.position.set(-w/2.5+i*w/3.1,1.35+h/2,pz);p.castShadow=true;g.add(p);
var base=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.45,0.15,6),M.marble);
base.position.set(-w/2.5+i*w/3.1,1.44,pz);g.add(base);
});
}
// 额枋
[-d/3,d/3].forEach(function(pz){
var beam=new THREE.Mesh(new THREE.BoxGeometry(w-2,0.25,0.3),M.pillar);
beam.position.set(0,1.35+h-0.12,pz);g.add(beam);
var plank=new THREE.Mesh(new THREE.BoxGeometry(w-1.5,0.1,0.25),M.gold);
plank.position.set(0,1.35+h+0.05,pz);g.add(plank);
// 彩画
var paint=new THREE.Mesh(new THREE.BoxGeometry(w-4,0.15,0.02),M.hexi);
paint.position.set(0,1.35+h-0.25,pz+0.16);g.add(paint);
});
// 斗拱
for(var i=0;i<6;i++){
[-d/3,d/3].forEach(function(pz){
var dg=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.18,0.4),M.gold);
dg.position.set(-w/2.5+i*w/3.1,1.35+h+0.18,pz);g.add(dg);
});
}
// 檐椽
var eave=new THREE.Mesh(new THREE.BoxGeometry(w+3.5,0.15,d+3.5),M.wood);
eave.position.y=1.35+h+0.35;g.add(eave);
// 屋顶
var rH=h*0.5;
var roof=new THREE.Mesh(new THREE.ConeGeometry(w*0.58,rH,4),M.roof);
roof.position.y=1.35+h+rH/2+0.5;roof.rotation.y=Math.PI/4;roof.scale.z=d/w;roof.castShadow=true;g.add(roof);
// 正脊
for(var i=0;i<3;i++){
var ridge=new THREE.Mesh(new THREE.BoxGeometry(0.12,0.2,d*0.75),M.gold);
ridge.position.set(-w*0.25+i*w*0.25,1.35+h+rH*0.75,0);g.add(ridge);
}
// 宝顶
var finial=new THREE.Mesh(new THREE.SphereGeometry(0.3,12,12),M.gold);
finial.position.y=1.35+h+rH+0.3;g.add(finial);
// 门
for(var i=-2;i<=2;i++){
var door=new THREE.Mesh(new THREE.BoxGeometry(0.9,h-1.5,0.05),M.wood);
door.position.set(i*1.8,1.35+h/2-0.3,-d/2+0.05);g.add(door);
}
scene.add(g);
}

function buildPavilion(x,y,z){
var g=new THREE.Group();g.position.set(x,y,z);
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(3,3.4,0.4,8),M.marble);
mesh.position.set(0,0.2,0);
g.add(mesh);
for(var i=0;i<6;i++){var a=i/6*Math.PI*2;
var p=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,2.5,6),M.pillar);
p.position.set(Math.cos(a)*2.2,1.7,Math.sin(a)*2.2);g.add(p);
}
var roof=new THREE.Mesh(new THREE.ConeGeometry(3.5,2,8),M.roof);
roof.position.y=4.2;roof.castShadow=true;g.add(roof);
var top=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),M.gold);
top.position.y=5.3;g.add(top);
scene.add(g);
}

function buildJiuzhou(){
buildHall(0,0,20,16,9);
var islands=[[35,0],[-35,0],[0,35],[0,-35],[28,28],[28,-28],[-28,28],[-28,-28]];
islands.forEach(function(isl){
var island=new THREE.Mesh(new THREE.CylinderGeometry(10,12,1.5,20),M.grass);
island.position.set(isl[0],0,isl[1]);scene.add(island);
buildPavilion(isl[0],1.5,isl[1]);
var dist=Math.sqrt(isl[0]*isl[0]+isl[1]*isl[1])-12;
if(dist>2){
var bridge=new THREE.Mesh(new THREE.BoxGeometry(dist,0.2,1.8),M.marble);
bridge.position.set(isl[0]/2,0.5,isl[1]/2);
if(Math.abs(isl[1])<1)bridge.rotation.y=0;
else if(Math.abs(isl[0])<1)bridge.rotation.y=Math.PI/2;
scene.add(bridge);
}
});
}

function buildDashuifa(){
var g=new THREE.Group();g.position.set(0,0,70);
// 基座
var mesh = new THREE.Mesh(new THREE.BoxGeometry(32,0.7,20),M.marble);
mesh.position.set(0,0.35,0);
mesh.castShadow=true;
g.add(mesh);
// 石龛
[-2.5,2.5].forEach(function(sx){
var mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8,6,0.8),M.marble);
mesh.position.set(sx,3.7,-4);
mesh.castShadow=true;
g.add(mesh);
});
var mesh = new THREE.Mesh(new THREE.BoxGeometry(6.5,1,1),M.marble);
mesh.position.set(0,7,-4);
g.add(mesh);
// 贝壳
var shell=new THREE.Mesh(new THREE.SphereGeometry(1.3,12,8,0,Math.PI*2,0,Math.PI*0.5),M.marble);
shell.position.set(0,7.8,-4);shell.rotation.x=-0.2;g.add(shell);
// 狮子头
var mesh = new THREE.Mesh(new THREE.SphereGeometry(0.35,10,10),M.bronze);
mesh.position.set(0,4,-3.4);
g.add(mesh);
// 水帘
for(var i=0;i<7;i++){
var w=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.4,0.06),M.water);
w.position.set((i-3)*0.3,3-i*0.3,-3);g.add(w);
}
// 罗马柱
for(var i=-6;i<=6;i+=2){
if(Math.abs(i)<3)continue;
var col=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.24,5,10),M.marble);
col.position.set(i,3.2,2);g.add(col);
var cap=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.5),M.marble);
cap.position.set(i,5.85,2);g.add(cap);
}
// 后墙
var mesh = new THREE.Mesh(new THREE.BoxGeometry(14,5.5,0.4),M.marbleD);
mesh.position.set(0,3.5,-6);
g.add(mesh);
// 菊花池
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(5,5.5,0.4,16),M.marble);
mesh.position.set(0,0.7,6);
g.add(mesh);
// 铜鹿
var deer=new THREE.Group();
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,1.1,10),M.bronze);
mesh.position.set(0,0.8,0);
mesh.rotation.set(0,0,Math.PI/2);
deer.add(mesh);
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.13,0.35,8),M.bronze);
mesh.position.set(0.35,1,0);
mesh.rotation.set(0,0,-0.4);
deer.add(mesh);
var mesh = new THREE.Mesh(new THREE.SphereGeometry(0.15,8,8),M.bronze);
mesh.position.set(0.48,1.15,0);
deer.add(mesh);
[-0.08,0.08].forEach(function(z){
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.025,0.4,5),M.bronze);
mesh.position.set(0.52,1.4,z);
mesh.rotation.set(0,0,0.3);
deer.add(mesh);
});
[-0.15,0.15].forEach(function(lx){
[-0.08,0.08].forEach(function(lz){
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.03,0.45,6),M.bronze);
mesh.position.set(lx,0.25,lz);
deer.add(mesh);
});
});
g.add(deer);
// 十只犬
for(var i=0;i<10;i++){
var a=i/10*Math.PI-Math.PI/2;
var dog=new THREE.Group();
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.55,8),M.bronze);
mesh.position.set(0,0.3,0);
mesh.rotation.set(0,0,Math.PI/2);
dog.add(mesh);
var mesh = new THREE.Mesh(new THREE.SphereGeometry(0.08,6,6),M.bronze);
mesh.position.set(0.22,0.4,0);
dog.add(mesh);
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.03,1.4,4),M.water);
mesh.position.set(0.4,0.5,0);
mesh.rotation.set(0,0,-0.35);
dog.add(mesh);
dog.position.set(Math.cos(a)*3.8,0.5,Math.sin(a)*3.8+6);
dog.rotation.y=-a+Math.PI;g.add(dog);
}
// 喷水塔
[-9,9].forEach(function(tx){
for(var i=0;i<13;i++){
var s=1.2-i*0.05;
var mesh = new THREE.Mesh(new THREE.BoxGeometry(s,0.24,s),M.marble);
mesh.position.set(tx,0.45+i*0.28,8);
g.add(mesh);
}
var mesh = new THREE.Mesh(new THREE.SphereGeometry(0.14,8,8),M.bronze);
mesh.position.set(tx,4.3,8);
g.add(mesh);
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.06,1.5,6),M.water);
mesh.position.set(tx,5.2,8);
g.add(mesh);
});
// 远瀛观石柱
for(var i=-3;i<=3;i++){
if(Math.abs(i)<2)continue;
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.28,5,10),M.marble);
mesh.position.set(i*2.2,3.2,-7.5);
mesh.rotation.set(0,0,(Math.random()-0.5)*0.06);
g.add(mesh);
var mesh = new THREE.Mesh(new THREE.BoxGeometry(0.45,0.25,0.45),M.marble);
mesh.position.set(i*2.2,5.9,-7.5);
g.add(mesh);
}
scene.add(g);
}

function buildFangpu(){
var base=new THREE.Mesh(new THREE.BoxGeometry(42,0.45,32),M.marble);
base.position.set(70,0.22,0);base.castShadow=true;scene.add(base);
buildHall(70,0,15,11,7.5);
[-16,16].forEach(function(sx){
var tower=new THREE.Group();tower.position.set(70+sx,0.5,0);
for(var f=0;f<3;f++){
var s=3.5-f*0.3;
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(s,s+0.1,2.8,8),M.pillar);
mesh.position.set(0,1.8+f*3.3,0);
mesh.castShadow=true;
tower.add(mesh);
var mesh = new THREE.Mesh(new THREE.CylinderGeometry(s+0.8,s+0.9,0.1,8),M.roof);
mesh.position.set(0,3.2+f*3.3,0);
tower.add(mesh);
}
var mesh = new THREE.Mesh(new THREE.ConeGeometry(3,1.6,8),M.roof);

function setupControls(){
var el=renderer.domElement;
el.addEventListener('mousedown',function(e){
if(e.button===0)isDrag=true;
else if(e.button===2)isPan=true;
prevM={x:e.clientX,y:e.clientY};
});
el.addEventListener('mouseup',function(){isDrag=false;isPan=false;});
el.addEventListener('mouseleave',function(){isDrag=false;isPan=false;});
el.addEventListener('mousemove',function(e){
var dx=e.clientX-prevM.x,dy=e.clientY-prevM.y;
if(isDrag){
camSph.theta-=dx*0.005;
camSph.phi=Math.max(0.15,Math.min(Math.PI*0.48,camSph.phi-dy*0.005));
applyCam();
}
if(isPan){
var s=0.08*(camSph.radius/60);
var o=new THREE.Vector3();
o.setFromMatrixColumn(camera.matrix,0);o.multiplyScalar(-dx*s);camTarget.add(o);camera.position.add(o);
o.setFromMatrixColumn(camera.matrix,1);o.multiplyScalar(dy*s);camTarget.add(o);camera.position.add(o);
}
prevM={x:e.clientX,y:e.clientY};
});
el.addEventListener('wheel',function(e){
e.preventDefault();
camSph.radius=Math.max(15,Math.min(200,camSph.radius*(e.deltaY>0?1.08:0.92)));
applyCam();
});
el.addEventListener('contextmenu',function(e){e.preventDefault();});
}

function applyCam(){
camera.position.copy(camTarget).add(new THREE.Vector3().setFromSpherical(camSph));
camera.lookAt(camTarget);
}

function setupUI(){
var btns=document.querySelectorAll('.scene-btn');
for(var i=0;i<btns.length;i++){
btns[i].addEventListener('click',function(){
var id=this.dataset.scene,d=SCENES[id];if(!d)return;
var allBtns=document.querySelectorAll('.scene-btn');
for(var j=0;j<allBtns.length;j++)allBtns[j].classList.remove('active');
this.classList.add('active');
document.getElementById('detail-title').textContent=d.title;
document.getElementById('detail-year').textContent=d.year;
document.getElementById('detail-desc').textContent=d.desc;
document.getElementById('detail-tags').innerHTML=d.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join('');
document.getElementById('detail').classList.add('show');
tgtPos=new THREE.Vector3(d.cam[0],d.cam[1],d.cam[2]);
tgtLook=new THREE.Vector3(d.pos[0],d.pos[1],d.pos[2]);
animT=Date.now();
});
}
}

function animate(){
requestAnimationFrame(animate);
if(tgtPos&&Date.now()-animT<1200){
var t=Math.min((Date.now()-animT)/1200,1);
var e=1-Math.pow(1-t,3);
var s0=new THREE.Spherical().setFromVector3(camera.position.clone().sub(camTarget));
var s1=new THREE.Spherical().setFromVector3(tgtPos.clone().sub(tgtLook));
camSph.theta=s0.theta+(s1.theta-s0.theta)*e;
camSph.phi=s0.phi+(s1.phi-s0.phi)*e;
camSph.radius=s0.radius+(s1.radius-s0.radius)*e;
camTarget.lerpVectors(camTarget,tgtLook,e);
applyCam();
}else{
tgtPos=null;
}
renderer.render(scene,camera);
}

window.addEventListener('resize',function(){
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

init();
</script>
