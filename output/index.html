<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重生·圆明园 | AI数字文化遗产3D重建</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Microsoft YaHei',sans-serif;background:#0a0a1a;overflow:hidden;color:#fff}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:100}
#ui>*{pointer-events:auto}
.header{position:absolute;top:0;left:0;right:0;padding:14px 24px;background:linear-gradient(180deg,rgba(0,0,0,0.9) 0%,transparent 100%);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,215,0,0.15)}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px}
.header h1 em{color:#ffd700;font-style:normal}
.header .info{font-size:11px;color:#666;padding:4px 10px;background:rgba(255,255,255,0.05);border-radius:12px}
.sidebar{position:absolute;top:65px;right:14px;width:200px;background:rgba(10,10,26,0.92);border-radius:12px;border:1px solid rgba(255,215,0,0.2);padding:14px}
.sidebar h3{font-size:12px;color:#ffd700;margin-bottom:10px;font-weight:500;letter-spacing:1px}
.scene-btn{width:100%;padding:10px 12px;margin-bottom:6px;background:rgba(255,255,255,0.04);border:1px solid transparent;border-radius:8px;cursor:pointer;text-align:left;transition:all 0.2s;color:#fff;font-size:13px}

.scene-btn span{font-size:11px;color:#888;display:block;margin-top:2px}

.detail h2{font-size:16px;color:#ffd700;margin-bottom:6px}
.detail .year{font-size:11px;color:#888;margin-bottom:8px}
.detail p{font-size:12px;color:#aaa;line-height:1.6}
.detail .tags{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.detail .tag{font-size:10px;padding:3px 8px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);border-radius:10px;color:#ffd700}
.stats{position:absolute;top:65px;left:14px;background:rgba(10,10,26,0.92);border-radius:12px;border:1px solid rgba(255,215,0,0.2);padding:14px;width:160px}
.stats h3{font-size:12px;color:#ffd700;margin-bottom:10px;font-weight:500}
.stat-item{display:flex;justify-content:space-between;margin-bottom:6px;font-size:11px}
.stat-item .num{color:#ffd700;font-weight:600}
.stat-item .label{color:#888}
.footer{position:absolute;bottom:16px;right:16px;font-size:10px;color:#555}
</style>
</head>
<body>
<div id="ui">
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px">
      <span style="font-size:22px">🏛️</span>
      <h1><em>重生·圆明园</em></h1>
    </div>
    <div class="info">2026 第19届全国3D大赛</div>
  </div>
  
  <div class="stats">
    <h3>📊 景区数据</h3>
    <div class="stat-item"><span class="num">1,247</span><span class="label">已复原建筑</span></div>
    <div class="stat-item"><span class="num">350</span><span class="label">景区面积(公顷)</span></div>
    <div class="stat-item"><span class="num">8,432</span><span class="label">历史文献</span></div>
    <div class="stat-item"><span class="num">2,048</span><span class="label">数字模型</span></div>
  </div>

  <div class="sidebar">
    <h3>📍 重点景区</h3>
    <button class="scene-btn active" data-scene="overview">🏞️ 全景漫游<span>圆明园全景俯瞰</span></button>
    <button class="scene-btn" data-scene="jiuzhou">🏝️ 九州清晏<span>九岛环水 · 皇帝寝宫</span></button>
    <button class="scene-btn" data-scene="dashuifa">🏛️ 大水法<span>西洋楼 · 猎狗逐鹿</span></button>
    <button class="scene-btn" data-scene="fangpu">🏯 方壶胜境<span>人间仙境 · 水上楼阁</span></button>
    <button class="scene-btn" data-scene="zhengda">👑 正大光明<span>圆明园正殿</span></button>
  </div>

  <div class="detail" id="detail">
    <h2 id="d-title">圆明园全景</h2>
    <div class="year" id="d-year">1707-1860</div>
    <p id="d-desc">圆明园由圆明园、长春园、绮春园三园组成，占地5200余亩，是清代大型皇家园林，被誉为"万园之园"。</p>
    <div class="tags" id="d-tags"><span class="tag">皇家园林</span><span class="tag">万园之园</span><span class="tag">文化遗产</span></div>
  </div>
  
  <div class="footer">左键旋转 · 滚轮缩放 · 右键平移</div>
</div>

<script src="three.min.js"></script>
<script>
(function(){
var SCENES={
  overview:{pos:[0,0,0],cam:[80,60,80],title:'圆明园全景',year:'1707-1860',desc:'圆明园由圆明园、长春园、绮春园三园组成，占地5200余亩，是清代大型皇家园林，被誉为"万园之园"。',tags:['皇家园林','万园之园','文化遗产']},
  jiuzhou:{pos:[0,0,0],cam:[50,35,50],title:'九州清晏',year:'1723 · 雍正元年',desc:'后湖中心九座岛屿象征华夏九州，主殿为皇帝寝宫，黄琉璃瓦歇山顶。',tags:['核心景区','九岛','皇帝寝宫']},
  dashuifa:{pos:[0,0,70],cam:[25,18,100],title:'大水法',year:'1747 · 乾隆十二年',desc:'巴洛克风格喷泉，铜鹿鹿角喷水八道，十只铜犬直射鹿身，"猎狗逐鹿"奇景。',tags:['西洋楼','巴洛克','喷泉']},
  fangpu:{pos:[70,0,0],cam:[100,25,25],title:'方壶胜境',year:'1750 · 乾隆十五年',desc:'仿神仙仙境，建筑矗立水面，九座仙桥相连，宛如蓬莱。',tags:['仙境','楼阁','九桥']},
  zhengda:{pos:[-70,0,0],cam:[-40,25,25],title:'正大光明',year:'1723 · 雍正元年',desc:'圆明园正殿，雍正御笔匾额，重檐歇山顶，华表石狮。',tags:['正殿','雍正御笔','华表']}
};

var M={
  marble:new THREE.MeshStandardMaterial({color:0xf5f0e8,roughness:0.3}),
  pillar:new THREE.MeshStandardMaterial({color:0x8b2020,roughness:0.6}),
  gold:new THREE.MeshStandardMaterial({color:0xd4a84b,roughness:0.3,metalness:0.7}),
  roof:new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:0.7}),
  roofY:new THREE.MeshStandardMaterial({color:0xc9a227,roughness:0.4,metalness:0.15}),
  wood:new THREE.MeshStandardMaterial({color:0x4a3020,roughness:0.8}),
  water:new THREE.MeshStandardMaterial({color:0x1a7a8a,roughness:0.1,metalness:0.2,transparent:true,opacity:0.85}),
  grass:new THREE.MeshStandardMaterial({color:0x3a6a3a,roughness:0.95}),
  bronze:new THREE.MeshStandardMaterial({color:0x8b7355,roughness:0.35,metalness:0.75}),
  rock:new THREE.MeshStandardMaterial({color:0x6a6a6a,roughness:0.9})
};

var scene,camera,renderer,camTarget=new THREE.Vector3(),camSph=new THREE.Spherical();
var isDrag=false,isPan=false,prevM={x:0,y:0};

function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x0a0a1a);
  scene.fog=new THREE.Fog(0x0a0a1a,80,250);
  
  camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,500);
  camera.position.set(80,60,80);
  
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled=true;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  document.body.insertBefore(renderer.domElement,document.body.firstChild);
  
  scene.add(new THREE.AmbientLight(0x8899bb,0.6));
  var sun=new THREE.DirectionalLight(0xffeedd,1.2);
  sun.position.set(60,100,40);sun.castShadow=true;
  scene.add(sun);
  scene.add(new THREE.DirectionalLight(0xaaccff,0.4).translateX(-40).translateY(50));
  
  buildWorld();
  setupControls();
  setupUI();
  updateCamSph();
  animate();
}

function buildWorld(){
  // 水面
  var water=new THREE.Mesh(new THREE.PlaneGeometry(400,400),M.water);
  water.rotation.x=-Math.PI/2;water.position.y=-0.1;scene.add(water);
  // 草地
  var gnd=new THREE.Mesh(new THREE.PlaneGeometry(500,500),M.grass);
  gnd.rotation.x=-Math.PI/2;gnd.position.y=-0.25;scene.add(gnd);
  // 假山
  for(var i=0;i<10;i++){
    var r=new THREE.Mesh(new THREE.DodecahedronGeometry(3+Math.random()*4,1),M.rock);
    r.position.set((Math.random()-0.5)*200,2,(Math.random()-0.5)*200);
    r.scale.y=0.5;scene.add(r);
  }
  // 树木
  for(var i=0;i<50;i++){
    var x=(Math.random()-0.5)*240,z=(Math.random()-0.5)*240;
    if(Math.abs(x)<20&&Math.abs(z)<20)continue;
    var trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.25,2.5,8),M.wood);
    trunk.position.set(x,1.25,z);scene.add(trunk);
    var leaves=new THREE.Mesh(new THREE.SphereGeometry(1.5,8,8),M.grass);
    leaves.position.set(x,3,z);scene.add(leaves);
  }
  buildJiuzhou();
  buildDashuifa();
  buildFangpu();
  buildZhengda();
}

function buildHall(x,z,w,d,h){
  var g=new THREE.Group();g.position.set(x,0,z);
  for(var i=0;i<3;i++){
    var b=new THREE.Mesh(new THREE.BoxGeometry(w+6-i*2,0.45,d+6-i*2),M.marble);
    b.position.y=0.22+i*0.45;b.castShadow=true;g.add(b);
  }
  for(var s=0;s<4;s++){
    var len=s%2===0?w+2:d+2;var n=Math.floor(len/1.5);
    for(var i=0;i<n;i++){
      var p=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,0.65,6),M.marble);
      var o=-len/2+i*(len/n)+len/(n*2);
      if(s===0)p.position.set(o,1.55,-d/2-2);
      else if(s===1)p.position.set(o,1.55,d/2+2);
      else if(s===2)p.position.set(-w/2-2,1.55,o);
      else p.position.set(w/2+2,1.55,o);
      g.add(p);
    }
  }
  for(var i=0;i<6;i++){
    var st=new THREE.Mesh(new THREE.BoxGeometry(4,0.1,0.4),M.marble);
    st.position.set(0,1.35+i*0.05,-d/2-2.5-i*0.35);g.add(st);
  }
  for(var i=0;i<6;i++){
    [-d/3,d/3].forEach(function(pz){
      var p=new THREE.Mesh(new THREE.CylinderGeometry(0.26,0.3,h,12),M.pillar);
      p.position.set(-w/2.5+i*w/3.1,1.35+h/2,pz);p.castShadow=true;g.add(p);
      var base=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.45,0.15,6),M.marble);
      base.position.set(-w/2.5+i*w/3.1,1.44,pz);g.add(base);
    });
  }
  [-d/3,d/3].forEach(function(pz){
    var beam=new THREE.Mesh(new THREE.BoxGeometry(w-2,0.25,0.3),M.pillar);
    beam.position.set(0,1.35+h-0.12,pz);g.add(beam);
    var plank=new THREE.Mesh(new THREE.BoxGeometry(w-1.5,0.1,0.25),M.gold);
    plank.position.set(0,1.35+h+0.05,pz);g.add(plank);
  });
  var eave=new THREE.Mesh(new THREE.BoxGeometry(w+3.5,0.15,d+3.5),M.wood);
  eave.position.y=1.35+h+0.35;g.add(eave);
  var rH=h*0.5;
  var roof=new THREE.Mesh(new THREE.ConeGeometry(w*0.58,rH,4),M.roof);
  roof.position.y=1.35+h+rH/2+0.5;roof.rotation.y=Math.PI/4;roof.scale.z=d/w;roof.castShadow=true;g.add(roof);
  var finial=new THREE.Mesh(new THREE.SphereGeometry(0.3,12,12),M.gold);
  finial.position.y=1.35+h+rH+0.3;g.add(finial);
  scene.add(g);
}

function buildPavilion(x,y,z){
  var g=new THREE.Group();g.position.set(x,y,z);
  var mesh=new THREE.Mesh(new THREE.CylinderGeometry(3,3.4,0.4,8),M.marble);
  mesh.position.set(0,0.2,0);g.add(mesh);
  for(var i=0;i<6;i++){var a=i/6*Math.PI*2;
    var p=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.1,2.5,6),M.pillar);
    p.position.set(Math.cos(a)*2.2,1.7,Math.sin(a)*2.2);g.add(p);
  }
  var roof=new THREE.Mesh(new THREE.ConeGeometry(3.5,2,8),M.roof);
  roof.position.y=4.2;roof.castShadow=true;g.add(roof);
  var top=new THREE.Mesh(new THREE.SphereGeometry(0.18,8,8),M.gold);
  top.position.y=5.3;g.add(top);
  scene.add(g);
}

function buildJiuzhou(){
  buildHall(0,0,20,16,9);
  var islands=[[35,0],[-35,0],[0,35],[0,-35],[28,28],[28,-28],[-28,28],[-28,-28]];
  islands.forEach(function(isl){
    var island=new THREE.Mesh(new THREE.CylinderGeometry(10,12,1.5,20),M.grass);
    island.position.set(isl[0],0,isl[1]);scene.add(island);
    buildPavilion(isl[0],1.5,isl[1]);
    var dist=Math.sqrt(isl[0]*isl[0]+isl[1]*isl[1])-12;
    if(dist>2){
      var bridge=new THREE.Mesh(new THREE.BoxGeometry(dist,0.2,1.8),M.marble);
      bridge.position.set(isl[0]/2,0.5,isl[1]/2);
      if(Math.abs(isl[1])<1)bridge.rotation.y=0;
      else if(Math.abs(isl[0])<1)bridge.rotation.y=Math.PI/2;
      scene.add(bridge);
    }
  });
}

function buildDashuifa(){
  var g=new THREE.Group();g.position.set(0,0,70);
  var mesh=new THREE.Mesh(new THREE.BoxGeometry(32,0.7,20),M.marble);
  mesh.position.set(0,0.35,0);mesh.castShadow=true;g.add(mesh);
  [-2.5,2.5].forEach(function(sx){
    var mesh=new THREE.Mesh(new THREE.BoxGeometry(0.8,6,0.8),M.marble);
    mesh.position.set(sx,3.7,-4);mesh.castShadow=true;g.add(mesh);
  });
  var mesh=new THREE.Mesh(new THREE.BoxGeometry(6.5,1,1),M.marble);
  mesh.position.set(0,7,-4);g.add(mesh);
  var shell=new THREE.Mesh(new THREE.SphereGeometry(1.3,12,8,0,Math.PI*2,0,Math.PI*0.5),M.marble);
  shell.position.set(0,7.8,-4);shell.rotation.x=-0.2;g.add(shell);
  var mesh=new THREE.Mesh(new THREE.SphereGeometry(0.35,10,10),M.bronze);
  mesh.position.set(0,4,-3.4);g.add(mesh);
  for(var i=0;i<7;i++){
    var w=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.4,0.06),M.water);
    w.position.set((i-3)*0.3,3-i*0.3,-3);g.add(w);
  }
  for(var i=-6;i<=6;i+=2){
    if(Math.abs(i)<3)continue;
    var col=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.24,5,10),M.marble);
    col.position.set(i,3.2,2);g.add(col);
    var cap=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.5),M.marble);
    cap.position.set(i,5.85,2);g.add(cap);
  }
  var mesh=new THREE.Mesh(new THREE.BoxGeometry(14,5.5,0.4),M.marble);
  mesh.position.set(0,3.5,-6);g.add(mesh);
  var mesh=new THREE.Mesh(new THREE.CylinderGeometry(5,5.5,0.4,16),M.marble);
  mesh.position.set(0,0.7,6);g.add(mesh);
  // 十二生肖铜首
  for(var i=0;i<12;i++){
    var angle=Math.PI+(i/11)*Math.PI;
    var r=4.5;
    var zx=Math.cos(angle)*r;
    var zy=6+Math.sin(angle)*r;
    var base=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.2,0.8,8),M.marble);
    base.position.set(zx,0.8,zy);g.add(base);
    var head=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),M.bronze);
    head.position.set(zx,1.4,zy);g.add(head);
  }
  scene.add(g);
}

function buildFangpu(){
  var base=new THREE.Mesh(new THREE.BoxGeometry(42,0.45,32),M.marble);
  base.position.set(70,0.22,0);base.castShadow=true;scene.add(base);
  buildHall(70,0,15,11,7.5);
  [-16,16].forEach(function(sx){
    var tower=new THREE.Group();tower.position.set(70+sx,0.5,0);
    for(var i=0;i<5;i++){
      var floor=new THREE.Mesh(new THREE.BoxGeometry(6-i*0.8,1.2,5-i*0.6),M.marble);
      floor.position.y=i*1.4;floor.castShadow=true;tower.add(floor);
      var eave=new THREE.Mesh(new THREE.BoxGeometry(7-i*0.7,0.12,6-i*0.5),M.wood);
      eave.position.y=i*1.4+0.7;tower.add(eave);
      var roof=new THREE.Mesh(new THREE.ConeGeometry(3.5-i*0.3,0.8,4),M.roofY);
      roof.position.y=i*1.4+1.2;roof.rotation.y=Math.PI/4;tower.add(roof);
    }
    var top=new THREE.Mesh(new THREE.SphereGeometry(0.25,8,8),M.gold);
    top.position.y=7.5;tower.add(top);
    scene.add(tower);
  });
  [[-12,-12],[12,-12],[-12,12],[12,12]].forEach(function(p){
    var bridge=new THREE.Mesh(new THREE.BoxGeometry(8,0.15,1.5),M.marble);
    bridge.position.set(70+p[0]*0.5,0.3,p[1]*0.5);scene.add(bridge);
  });
  [[70,-20],[70,20]].forEach(function(p){buildPavilion(p[0],1.5,p[1]);});
}

function buildZhengda(){
  buildHall(-70,0,22,16,10);
  var mesh=new THREE.Mesh(new THREE.BoxGeometry(12,0.22,6),M.marble);
  mesh.position.set(-70,1.33,-13);scene.add(mesh);
  [-3,3].forEach(function(hx){
    var x=-70+hx,z=-15;
    var base=new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.6,0.4,8),M.marble);
    base.position.set(x,0.2,z);scene.add(base);
    var pillar=new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.25,4,8),M.marble);
    pillar.position.set(x,2.4,z);scene.add(pillar);
    var top=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.2,0.3,8),M.marble);
    top.position.set(x,4.5,z);scene.add(top);
    var cloud=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.15,1.2),M.marble);
    cloud.position.set(x,4.7,z);scene.add(cloud);
  });
  for(var i=0;i<8;i++){
    var lion=new THREE.Mesh(new THREE.BoxGeometry(0.5,1,0.4),M.marble);
    lion.position.set(-70-12+i*3.5,1.8,-13);scene.add(lion);
  }
}

function setupControls(){
  var el=renderer.domElement;
  el.addEventListener('mousedown',function(e){
    if(e.button===0)isDrag=true;
    else if(e.button===2)isPan=true;
    prevM={x:e.clientX,y:e.clientY};
  });
  el.addEventListener('contextmenu',function(e){e.preventDefault()});
  window.addEventListener('mouseup',function(){isDrag=false;isPan=false});
  window.addEventListener('mousemove',function(e){
    var dx=e.clientX-prevM.x,dy=e.clientY-prevM.y;
    if(isDrag){
      camSph.theta-=dx*0.005;
      camSph.phi=Math.max(0.1,Math.min(Math.PI-0.1,camSph.phi-dy*0.005));
    }
    if(isPan){
      var s=0.08*(camSph.radius/60);
      var o=new THREE.Vector3();
      o.setFromMatrixColumn(camera.matrix,0);o.multiplyScalar(-dx*s);camTarget.add(o);camera.position.add(o);
      o.setFromMatrixColumn(camera.matrix,1);o.multiplyScalar(dy*s);camTarget.add(o);camera.position.add(o);
    }
    prevM={x:e.clientX,y:e.clientY};
  });
  el.addEventListener('wheel',function(e){
    camSph.radius*=1+e.deltaY*0.001;
    camSph.radius=Math.max(10,Math.min(300,camSph.radius));
  });
}

function updateCamSph(){
  var offset=camera.position.clone().sub(camTarget);
  camSph.setFromVector3(offset);
}

function setScene(name){
  var s=SCENES[name];if(!s)return;
  camTarget.set(s.pos[0],s.pos[1],s.pos[2]);
  var endPos=new THREE.Vector3(s.cam[0],s.cam[1],s.cam[2]);
  var startPos=camera.position.clone();
  var startTime=Date.now();
  function flyTo(){
    var t=Math.min(1,(Date.now()-startTime)/1000);
    t=t*t*(3-2*t);
    camera.position.lerpVectors(startPos,endPos,t);
    camera.lookAt(camTarget);
    if(t<1)requestAnimationFrame(flyTo);
    else updateCamSph();
  }
  flyTo();
  document.getElementById('d-title').textContent=s.title;
  document.getElementById('d-year').textContent=s.year;
  document.getElementById('d-desc').textContent=s.desc;
  document.getElementById('d-tags').innerHTML=s.tags.map(function(t){return '<span class="tag">'+t+'</span>'}).join('');
  document.querySelectorAll('.scene-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelector('[data-scene="'+name+'"]').classList.add('active');
}

function setupUI(){
  document.querySelectorAll('.scene-btn').forEach(function(btn){
    btn.addEventListener('click',function(){setScene(this.dataset.scene)});
  });
}

function animate(){
  requestAnimationFrame(animate);
  camera.lookAt(camTarget);
  renderer.render(scene,camera);
}

window.addEventListener('resize',function(){
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

init();
})();
</script>
</body>
</html>
