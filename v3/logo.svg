<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#f5ecd0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a84b"/>
      <stop offset="50%" stop-color="#b8942e"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d68a"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="95" r="72"/>
    </clipPath>
    <filter id="ink" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  
  <!-- 外圆金边 -->
  <circle cx="100" cy="95" r="76" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <circle cx="100" cy="95" r="73" fill="none" stroke="url(#goldLight)" stroke-width="0.5"/>
  
  <!-- 内圆背景 -->
  <circle cx="100" cy="95" r="72" fill="url(#bg)"/>
  
  <g clip-path="url(#circle)">
    <!-- 远山水墨 -->
    <path d="M28,95 Q50,55 80,65 Q95,50 115,60 Q140,45 160,55 L172,95 Z" fill="#c9b88a" opacity="0.3" filter="url(#ink)"/>
    <path d="M28,95 Q55,70 85,75 Q100,62 120,68 Q145,58 172,70 L172,95 Z" fill="#b8a87a" opacity="0.25" filter="url(#ink)"/>
    
    <!-- 中式宫殿（左侧） -->
    <g transform="translate(45,55)">
      <!-- 屋顶 -->
      <path d="M0,20 L18,5 L36,20" fill="url(#gold)" opacity="0.85"/>
      <path d="M2,20 L18,8 L34,20" fill="#f5ecd0" opacity="0.4"/>
      <!-- 屋脊翘角 -->
      <path d="M0,20 Q-4,16 -2,12" stroke="#8b6914" stroke-width="1" fill="none"/>
      <path d="M36,20 Q40,16 38,12" stroke="#8b6914" stroke-width="1" fill="none"/>
      <!-- 墙体 -->
      <rect x="5" y="20" width="26" height="16" fill="#f5ecd0" stroke="#c9a227" stroke-width="0.5"/>
      <!-- 柱子 -->
      <line x1="10" y1="20" x2="10" y2="36" stroke="#8b2020" stroke-width="1.2"/>
      <line x1="18" y1="20" x2="18" y2="36" stroke="#8b2020" stroke-width="1.2"/>
      <line x1="26" y1="20" x2="26" y2="36" stroke="#8b2020" stroke-width="1.2"/>
      <!-- 门 -->
      <rect x="14" y="26" width="8" height="10" fill="#4a3020" rx="4" ry="4"/>
    </g>
    
    <!-- 中式亭子（左上） -->
    <g transform="translate(30,50)">
      <path d="M0,12 L10,2 L20,12" fill="url(#gold)" opacity="0.7"/>
      <line x1="5" y1="12" x2="5" y2="20" stroke="#8b2020" stroke-width="0.8"/>
      <line x1="15" y1="12" x2="15" y2="20" stroke="#8b2020" stroke-width="0.8"/>
      <rect x="5" y="10" width="10" height="2" fill="#c9a227"/>
    </g>
    
    <!-- 大水法西洋楼（右侧） -->
    <g transform="translate(105,48)">
      <!-- 后墙 -->
      <rect x="0" y="8" width="32" height="24" fill="#f0e8d0" stroke="#c9a227" stroke-width="0.5"/>
      <!-- 拱门 -->
      <path d="M10,32 L10,18 Q16,10 22,18 L22,32" fill="#4a3020" opacity="0.6"/>
      <path d="M12,32 L12,20 Q16,13 20,20 L20,32" fill="#f5ecd0"/>
      <!-- 柱子 -->
      <rect x="4" y="8" width="2.5" height="24" fill="#f0e8d0" stroke="#c9a227" stroke-width="0.3"/>
      <rect x="25.5" y="8" width="2.5" height="24" fill="#f0e8d0" stroke="#c9a227" stroke-width="0.3"/>
      <!-- 柱头 -->
      <rect x="3" y="6" width="4.5" height="3" fill="#d4a84b" rx="0.5"/>
      <rect x="24.5" y="6" width="4.5" height="3" fill="#d4a84b" rx="0.5"/>
      <!-- 蚌壳装饰 -->
      <path d="M12,10 Q16,4 20,10" fill="url(#goldLight)" opacity="0.8"/>
      <!-- 涡卷 -->
      <path d="M6,16 Q4,14 6,12" stroke="#c9a227" stroke-width="0.8" fill="none"/>
      <path d="M26,16 Q28,14 26,12" stroke="#c9a227" stroke-width="0.8" fill="none"/>
      <!-- 喷泉水柱 -->
      <line x1="16" y1="20" x2="16" y2="10" stroke="#6ab8c8" stroke-width="0.6" opacity="0.7"/>
      <line x1="14" y1="22" x2="13" y2="12" stroke="#6ab8c8" stroke-width="0.4" opacity="0.5"/>
      <line x1="18" y1="22" x2="19" y2="12" stroke="#6ab8c8" stroke-width="0.4" opacity="0.5"/>
      <!-- 罗马柱装饰 -->
      <rect x="8" y="12" width="1" height="18" fill="#e8dcc0" opacity="0.5"/>
      <rect x="23" y="12" width="1" height="18" fill="#e8dcc0" opacity="0.5"/>
    </g>
    
    <!-- 水系 -->
    <path d="M30,98 Q55,92 80,95 Q100,98 120,94 Q145,90 165,95" stroke="#6ab8c8" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M35,101 Q60,95 85,98 Q105,101 125,97 Q150,93 168,98" stroke="#6ab8c8" stroke-width="1" fill="none" opacity="0.35"/>
    
    <!-- 树木 -->
    <g transform="translate(28,80)">
      <circle cx="5" cy="3" r="5" fill="#6a8a4a" opacity="0.6"/>
      <circle cx="8" cy="1" r="4" fill="#7a9a5a" opacity="0.5"/>
      <line x1="5" y1="8" x2="5" y2="14" stroke="#6a5030" stroke-width="0.8"/>
    </g>
    <g transform="translate(155,75)">
      <circle cx="5" cy="3" r="6" fill="#6a8a4a" opacity="0.55"/>
      <circle cx="9" cy="1" r="4.5" fill="#7a9a5a" opacity="0.45"/>
      <line x1="5" y1="9" x2="5" y2="16" stroke="#6a5030" stroke-width="0.8"/>
    </g>
    <g transform="translate(90,85)">
      <circle cx="4" cy="2" r="4" fill="#6a8a4a" opacity="0.5"/>
      <line x1="4" y1="6" x2="4" y2="11" stroke="#6a5030" stroke-width="0.6"/>
    </g>
  </g>
  
  <!-- 书法标题 -->
  <text x="100" y="180" text-anchor="middle" font-family="'STKaiti','KaiTi','SimSun',serif" font-size="18" font-weight="bold" fill="url(#gold)" letter-spacing="3">复原圆明园</text>
  
  <!-- 红色印章 -->
  <g transform="translate(148,108)">
    <rect x="0" y="0" width="18" height="18" rx="2" fill="#cc3333" opacity="0.85"/>
    <text x="9" y="8" text-anchor="middle" font-family="'STKaiti','KaiTi','SimSun',serif" font-size="5.5" fill="#fff" font-weight="bold">圆明</text>
    <text x="9" y="15" text-anchor="middle" font-family="'STKaiti','KaiTi','SimSun',serif" font-size="5.5" fill="#fff" font-weight="bold">园</text>
  </g>
</svg>
