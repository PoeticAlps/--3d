<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .dir-letter { font-family: 'Georgia', 'Times New Roman', serif; font-weight: bold; fill: #FFD700; }
      .dir-letter-small { font-family: 'Georgia', 'Times New Roman', serif; font-weight: bold; fill: rgba(255,215,0,0.6); font-size: 10px; }
    </style>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,215,0,0.2)" stroke-width="1.5"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="rgba(255,215,0,0.12)" stroke-width="0.8"/>
  
  <!-- Tick marks (degree marks) -->
  <g stroke="rgba(255,215,0,0.35)" stroke-width="0.8">
    <!-- Major ticks at cardinal directions -->
    <line x1="100" y1="8" x2="100" y2="18"/>
    <line x1="100" y1="182" x2="100" y2="192"/>
    <line x1="8" y1="100" x2="18" y2="100"/>
    <line x1="182" y1="100" x2="192" y2="100"/>
  </g>
  <g stroke="rgba(255,215,0,0.25)" stroke-width="0.5">
    <!-- Minor ticks -->
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(15 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(30 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(45 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(60 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(75 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(105 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(120 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(135 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(150 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(165 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(195 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(210 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(225 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(240 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(255 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(285 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(300 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(315 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(330 100 100)"/>
    <line x1="100" y1="10" x2="100" y2="14" transform="rotate(345 100 100)"/>
  </g>
  
  <!-- Inner decorative circle -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="rgba(255,215,0,0.18)" stroke-width="1"/>
  
  <!-- 8-point star (main compass rose) -->
  <!-- N-S main diamond -->
  <polygon points="100,20 108,100 100,180 92,100" fill="rgba(255,215,0,0.15)" stroke="rgba(255,215,0,0.5)" stroke-width="0.8"/>
  <!-- N half (bright) -->
  <polygon points="100,20 108,100 100,100" fill="rgba(255,215,0,0.35)"/>
  <polygon points="100,20 92,100 100,100" fill="rgba(255,215,0,0.2)"/>
  <!-- S half (dimmer) -->
  <polygon points="100,180 108,100 100,100" fill="rgba(255,215,0,0.1)"/>
  <polygon points="100,180 92,100 100,100" fill="rgba(255,215,0,0.08)"/>
  
  <!-- E-W main diamond -->
  <polygon points="20,100 100,92 180,100 100,108" fill="rgba(255,215,0,0.1)" stroke="rgba(255,215,0,0.35)" stroke-width="0.6"/>
  <polygon points="180,100 100,92 100,100" fill="rgba(255,215,0,0.2)"/>
  <polygon points="180,100 100,108 100,100" fill="rgba(255,215,0,0.12)"/>
  <polygon points="20,100 100,92 100,100" fill="rgba(255,215,0,0.08)"/>
  <polygon points="20,100 100,108 100,100" fill="rgba(255,215,0,0.06)"/>
  
  <!-- NE-SW diamond -->
  <polygon points="36,36 100,92 164,164 100,108" fill="rgba(255,215,0,0.06)" stroke="rgba(255,215,0,0.2)" stroke-width="0.5" transform="rotate(0)"/>
  <line x1="36" y1="36" x2="100" y2="100" stroke="rgba(255,215,0,0.2)" stroke-width="0.5"/>
  <line x1="164" y1="36" x2="100" y2="100" stroke="rgba(255,215,0,0.2)" stroke-width="0.5"/>
  <line x1="36" y1="164" x2="100" y2="100" stroke="rgba(255,215,0,0.2)" stroke-width="0.5"/>
  <line x1="164" y1="164" x2="100" y2="100" stroke="rgba(255,215,0,0.2)" stroke-width="0.5"/>
  
  <!-- Intercardinal small diamonds -->
  <polygon points="36,36 44,100 100,100 100,44" fill="rgba(255,215,0,0.12)"/>
  <polygon points="164,36 156,100 100,100 100,44" fill="rgba(255,215,0,0.1)"/>
  <polygon points="36,164 44,100 100,100 100,156" fill="rgba(255,215,0,0.08)"/>
  <polygon points="164,164 156,100 100,100 100,156" fill="rgba(255,215,0,0.06)"/>
  
  <!-- Center circle -->
  <circle cx="100" cy="100" r="8" fill="rgba(10,10,26,0.9)" stroke="rgba(255,215,0,0.4)" stroke-width="1"/>
  <circle cx="100" cy="100" r="3" fill="#FFD700"/>
  
  <!-- Cardinal direction letters -->
  <text x="100" y="16" text-anchor="middle" class="dir-letter" font-size="16">N</text>
  <text x="100" y="196" text-anchor="middle" class="dir-letter" font-size="14">S</text>
  <text x="6" y="104" text-anchor="middle" class="dir-letter" font-size="14">W</text>
  <text x="194" y="104" text-anchor="middle" class="dir-letter" font-size="14">E</text>
  
  <!-- Intercardinal letters -->
  <text x="28" y="32" text-anchor="middle" class="dir-letter-small" font-size="10">NW</text>
  <text x="172" y="32" text-anchor="middle" class="dir-letter-small" font-size="10">NE</text>
  <text x="28" y="176" text-anchor="middle" class="dir-letter-small" font-size="10">SW</text>
  <text x="172" y="176" text-anchor="middle" class="dir-letter-small" font-size="10">SE</text>
  
  <!-- Small dots at intercardinal points -->
  <circle cx="38" cy="38" r="2" fill="rgba(255,215,0,0.3)"/>
  <circle cx="162" cy="38" r="2" fill="rgba(255,215,0,0.3)"/>
  <circle cx="38" cy="162" r="2" fill="rgba(255,215,0,0.3)"/>
  <circle cx="162" cy="162" r="2" fill="rgba(255,215,0,0.3)"/>
</svg>