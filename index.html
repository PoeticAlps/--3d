<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圆明园3D重建 - 数字文化遗产</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            color: white;
            max-width: 300px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        #info-panel h1 {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        #info-panel p {
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }
        
        .spot-btn {
            display: inline-block;
            margin: 5px 5px 0 0;
            padding: 6px 12px;
            background: linear-gradient(135deg, #8b4513, #cd853f);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .spot-btn:hover {
            background: linear-gradient(135deg, #cd853f, #daa520);
            transform: scale(1.05);
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 24px;
            text-align: center;
            z-index: 200;
        }
        
        #loading .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 215, 0, 0.2);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            color: #aaa;
            font-size: 12px;
        }
        
        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            color: #ffd700;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div id="loading">
        <div class="spinner"></div>
        <div>正在加载圆明园3D场景...</div>
    </div>
    
    <div id="info-panel">
        <h1>🏛️ 圆明园数字重建</h1>
        <p>数字文化遗产3D重建项目<br>
        参赛作品 - 2026年第19届全国3D大赛</p>
        <div style="margin-top: 12px;">
            <span class="spot-btn" onclick="focusSpot('jiuzhou')">九州清晏</span>
            <span class="spot-btn" onclick="focusSpot('dashuifa')">大水法</span>
            <span class="spot-btn" onclick="focusSpot('fanghu')">方壶胜境</span>
            <span class="spot-btn" onclick="focusSpot('zhengda')">正大光明</span>
            <span class="spot-btn" onclick="focusSpot('overview')">全景</span>
        </div>
    </div>
    
    <div id="stats">
        <div>模型加载中...</div>
    </div>
    
    <div id="controls-hint">
        🖱️ 左键旋转 | 滚轮缩放 | 右键平移
    </div>
    
    <script src="three.min.js"></script>
    <script src="GLTFLoader.js"></script>
    <script src="OrbitControls.js"></script>
    
    <script>
        let scene, camera, renderer, controls, model;
        const container = document.getElementById('container');
        const loading = document.getElementById('loading');
        const stats = document.getElementById('stats');
        
        // 景点摄像机位置
        const spotPositions = {
            jiuzhou: { pos: {x: 5, y: 4, z: 8}, target: {x: 0, y: 2, z: 0} },
            dashuifa: { pos: {x: 18, y: 6, z: 8}, target: {x: 12, y: 2, z: 0} },
            fanghu: { pos: {x: -5, y: 8, z: 15}, target: {x: -10, y: 3, z: 8} },
            zhengda: { pos: {x: 5, y: 6, z: -5}, target: {x: 0, y: 2, z: -10} },
            overview: { pos: {x: 25, y: 20, z: 25}, target: {x: 0, y: 0, z: 0} }
        };
        
        function init() {
            // 场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 100);
            
            // 相机
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(25, 20, 25);
            
            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);
            
            // 控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 80;
            controls.maxPolarAngle = Math.PI / 2.1;
            
            // 灯光
            setupLights();
            
            // 加载模型
            loadModel();
            
            // 窗口调整
            window.addEventListener('resize', onWindowResize);
            
            // 动画循环
            animate();
        }
        
        function setupLights() {
            // 环境光
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);
            
            // 太阳光
            const sun = new THREE.DirectionalLight(0xfff5e0, 1.5);
            sun.position.set(20, 30, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 100;
            sun.shadow.camera.left = -30;
            sun.shadow.camera.right = 30;
            sun.shadow.camera.top = 30;
            sun.shadow.camera.bottom = -30;
            scene.add(sun);
            
            // 补光
            const fill = new THREE.DirectionalLight(0x8090ff, 0.3);
            fill.position.set(-10, 10, -10);
            scene.add(fill);
            
            // 半球光
            const hemi = new THREE.HemisphereLight(0x87CEEB, 0x8b7355, 0.4);
            scene.add(hemi);
        }
        
        function loadModel() {
            const loader = new THREE.GLTFLoader();
            
            // 优先加载精细模型，不存在则加载旧模型
            loader.load('yuanmingyuan_detailed.glb', 
                // 成功回调
                function(gltf) {
                    model = gltf.scene;
                    
                    // 遍历设置阴影
                    model.traverse(function(child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    
                    scene.add(model);
                    loading.style.display = 'none';
                    updateStats();
                },
                // 进度回调
                function(xhr) {
                    if (xhr.total) {
                        const percent = Math.round((xhr.loaded / xhr.total) * 100);
                        loading.innerHTML = `<div class="spinner"></div><div>加载中 ${percent}%...</div>`;
                    }
                },
                // 失败回调 - 尝试加载旧模型
                function(error) {
                    console.log('精细模型未找到，加载基础模型...');
                    loader.load('yuanmingyuan.glb', 
                        function(gltf) {
                            model = gltf.scene;
                            model.traverse(function(child) {
                                if (child.isMesh) {
                                    child.castShadow = true;
                                    child.receiveShadow = true;
                                }
                            });
                            scene.add(model);
                            loading.style.display = 'none';
                            stats.innerHTML = '<div>基础模型 | 在Blender中导出yuanmingyuan_detailed.glb获取精细版</div>';
                        },
                        undefined,
                        function(err) {
                            loading.innerHTML = '<div style="color:#ff6b6b">⚠️ 模型加载失败<br>请在Blender中运行脚本并导出GLB</div>';
                        }
                    );
                }
            );
        }
        
        function updateStats() {
            let vertices = 0, meshes = 0;
            scene.traverse(function(child) {
                if (child.isMesh) {
                    meshes++;
                    if (child.geometry) {
                        vertices += child.geometry.attributes.position ? child.geometry.attributes.position.count : 0;
                    }
                }
            });
            stats.innerHTML = `<div>模型: ${meshes}个网格 | ${(vertices/1000).toFixed(1)}K顶点</div>`;
        }
        
        function focusSpot(name) {
            const spot = spotPositions[name];
            if (!spot) return;
            
            const duration = 1500;
            const startPos = { ...camera.position };
            const startTarget = { ...controls.target };
            const startTime = Date.now();
            
            function animateCamera() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                
                camera.position.x = startPos.x + (spot.pos.x - startPos.x) * eased;
                camera.position.y = startPos.y + (spot.pos.y - startPos.y) * eased;
                camera.position.z = startPos.z + (spot.pos.z - startPos.z) * eased;
                
                controls.target.x = startTarget.x + (spot.target.x - startTarget.x) * eased;
                controls.target.y = startTarget.y + (spot.target.y - startTarget.y) * eased;
                controls.target.z = startTarget.z + (spot.target.z - startTarget.z) * eased;
                
                if (progress < 1) {
                    requestAnimationFrame(animateCamera);
                }
            }
            animateCamera();
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        // 启动
        init();
    </script>
</body>
</html>
